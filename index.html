<title>24 Seven - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#090909;
    color:white;
}
header{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:black;
    border-bottom:2px solid gold;
}
.logo{
    color:gold;
    font-size:40px;
    font-weight:bold;
}
nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
}
nav a:hover{
    color:gold;
}

/* HERO */
.hero{
    height:95vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:
      linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.7)),
      url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1800');
    background-size:cover;
    background-position:center;
}
.hero h1{
    color:gold;
    font-size:90px;
}
.hero h2{
    margin-top:20px;
    font-size:35px;
}
.hero button{
    margin-top:30px;
    padding:15px 35px;
    background:gold;
    color:black;
    border:none;
    font-weight:bold;
    border-radius:30px;
    cursor:pointer;
}

/* TRUST BADGES */
.badges{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:35px;
    flex-wrap:wrap;
}
.badge{
    background:#111;
    border:1px solid rgba(255,215,0,.3);
    padding:20px 30px;
    border-radius:12px;
}

/* COLLECTIONS */
.section-title{
    text-align:center;
    color:gold;
    font-size:42px;
    margin:50px 0 30px;
}
.collections{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    padding-bottom:40px;
}
.collection-card{
    width:300px;
    height:220px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
}
.collection-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
}

/* BEST SELLERS */
.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:30px;
}
.product{
    width:220px;
    background:#111;
    border:1px solid rgba(255,215,0,.2);
    border-radius:14px;
    overflow:hidden;
}
.product img{
    width:100%;
    height:250px;
    object-fit:cover;
}
.product h3,.product p{
    text-align:center;
    padding:10px;
}
.price{
    color:gold;
}

footer{
    margin-top:50px;
    background:black;
    text-align:center;
    padding:30px;
    color:#aaa;
}
</style>
</head>
<body>

<header>
    <div class="logo">24<span>Seven</span></div>
    <nav>
        <a href="https://asif78993159.github.io/24Seven/">Home</a>
        <a href="pages/product.html">Products</a>
         <a href="pages/gallery.html">Gallery</a>
        <a href="pages/contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h1>24 Seven</h1>
        <h2>Premium Jerseys For Youth</h2>
        <button>SHOP NOW</button>
    </div>
</section>

<div class="badges">
    <div class="badge">Premium Quality</div>
    <div class="badge">Cash on Delivery</div>
    <div class="badge">Fast Shipping</div>
    <div class="badge">Dri-Fit Fabric</div>
</div>

<h2 class="section-title">Shop By Category</h2>

<div class="collections">
    <div class="collection-card">
        <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=800">
        <div class="overlay">International</div>
    </div>

    <div class="collection-card">
        <img src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?q=80&w=800">
        <div class="overlay">Club Jerseys</div>
    </div>

    <div class="collection-card">
        <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=800">
        <div class="overlay">Custom Jerseys</div>
    </div>
</div>

<h2 class="section-title">Best Sellers</h2>

<div class="products">
    <div class="product">
        <img src="https://picsum.photos/300?1">
        <h3>Argentina</h3>
        <p class="price">₹999</p>
    </div>
    <div class="product">
        <img src="https://picsum.photos/300?2">
        <h3>Portugal</h3>
        <p class="price">₹999</p>
    </div>
    <div class="product">
        <img src="https://picsum.photos/300?3">
        <h3>Brazil</h3>
        <p class="price">₹999</p>
    </div>
    <div class="product">
        <img src="https://picsum.photos/300?4">
        <h3>France</h3>
        <p class="price">₹999</p>
    </div>
</div>

<footer>
© 2026 24 Seven
</footer>

</body>
</html>
