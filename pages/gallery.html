<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 Seven Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#090909;
    color:white;
}
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:black;
    border-bottom:2px solid gold;
}
.logo{
    color:gold;
    font-size:40px;
    font-weight:bold;
}
nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
}
nav a:hover{
    color:gold;
}
.hero{
    text-align:center;
    padding:60px 20px;
}
.hero h1{
    color:gold;
    font-size:60px;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}
.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:18px;
    border:1px solid rgba(255,215,0,.3);
    transition:.4s;
}
.gallery img:hover{
    transform:scale(1.04);
    box-shadow:0 0 20px rgba(255,215,0,.3);
}
footer{
    background:black;
    text-align:center;
    padding:25px;
    color:#999;
}
</style>
</head>
<body>

<header>
    <div class="logo">24 Seven</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Jersey Gallery</h1>
</section>

<div class="gallery">
    <img src="https://picsum.photos/400?1" alt="Argentina">
    <img src="https://picsum.photos/400?2" alt="Portugal">
    <img src="https://picsum.photos/400?3" alt="Brazil">
    <img src="https://picsum.photos/400?4" alt="France">
    <img src="https://picsum.photos/400?5" alt="Real Madrid">
    <img src="https://picsum.photos/400?6" alt="Barcelona">
    <img src="https://picsum.photos/400?7" alt="Arsenal">
    <img src="https://picsum.photos/400?8" alt="Manchester City">
</div>

<footer>
© 2026 24 Seven
</footer>

</body>
</html>
